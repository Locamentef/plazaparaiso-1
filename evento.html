<script>
(function () {
  // ── Fallback: mapa estático organización ← slug/código de evento
  // Se usa si la API no responde o estamos en local sin Netlify Functions.
  var FALLBACK_ORG = 'locamente';
  var LOCO_BONGO_CODES = ['MU39','AGRD','3SS6','M97E','4DIB','97ZJ','O70Q','1Z7B','6HGX'];

  // Extraer el código/slug del hash: evento.html#/SLUG o evento.html#SLUG
  function getEventCode() {
    var hash = window.location.hash || '';
    return hash.replace(/^#\/?/, '').toUpperCase();
  }

  // Determinar el organizer a partir del código (fallback estático)
  function fallbackOrg(code) {
    return LOCO_BONGO_CODES.indexOf(code) !== -1 ? 'loco-bongo-torremolinos' : FALLBACK_ORG;
  }

  // Cargar el widget de Fourvenues con el organizer dado
  function loadWidget(orgSlug) {
    var container = document.getElementById('fv-widget');
    var loading   = document.getElementById('fv-loading');
    if (loading) loading.remove();

    // Solo cargar el widget en el dominio autorizado (evita Script error cross-origin en preview)
    var host = window.location.hostname;
    var isProd = host === 'www.plazaparaiso.com' || host === 'plazaparaiso.com';
    if (!isProd) {
      container.innerHTML = '<div class="evento-error"><p>El widget de entradas está disponible en <strong>plazaparaiso.com</strong>.<br><a href="https://www.plazaparaiso.com/evento' + window.location.hash + '">Abrir en producción →</a></p></div>';
      return;
    }

    var s = document.createElement('script');
    s.src  = 'https://www.fourvenues.com/assets/iframe/' + orgSlug;
    s.type = 'text/javascript';
    container.appendChild(s);
  }

  // Mostrar error si nada funcionó
  function showError() {
    var container = document.getElementById('fv-widget');
    container.innerHTML = '<div class="evento-error"><p>No se pudo cargar el widget de entradas.<br><a href="entradas.html">Ver todos los eventos</a></p></div>';
  }

  // ── Intentar obtener el organizer desde la API de Channel Manager ──
  var code = getEventCode();

  // Primero probar con la Netlify Function (solo disponible en producción / Netlify)
  fetch('/api/eventos')
    .then(function (res) {
      if (!res.ok) throw new Error('API ' + res.status);
      return res.json();
    })
    .then(function (data) {
      var events = data.events || [];
      // Buscar el evento cuyo slug coincida con el código de la URL
      var match = events.find(function (ev) {
        return ev.slug && ev.slug.toUpperCase() === code;
      });
      var org = (match && match.organizationSlug) ? match.organizationSlug : fallbackOrg(code);
      loadWidget(org);
    })
    .catch(function () {
      // API no disponible (preview local, error de red…) → fallback estático
      loadWidget(fallbackOrg(code));
    });
})();
</script>
