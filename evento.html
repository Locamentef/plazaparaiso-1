<!-- Si no hay hash de evento, redirigir antes de cargar nada más -->
<script>
(function () {
  var hash = window.location.hash;
  if (!hash || hash.indexOf('#events/') !== 0) {
    // Sin hash válido: volver atrás si el referrer es del mismo dominio, si no a /programa
    var referrer = document.referrer;
    var sameDomain = false;
    if (referrer) {
      try { sameDomain = new URL(referrer).hostname === window.location.hostname; } catch (e) {}
    }
    if (sameDomain && history.length > 1) {
      history.back();
    } else {
      window.location.replace('/programa');
    }
  }
})();
</script>

<script>
(function () {
  var btn = document.getElementById('btn-volver');
  if (!btn) return;
  // Solo usar history.back() si el referrer es del mismo dominio
  var referrer = document.referrer;
  var sameDomain = false;
  if (referrer) {
    try { sameDomain = new URL(referrer).hostname === window.location.hostname; } catch (e) {}
  }
  if (sameDomain && history.length > 1) {
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      history.back();
    });
  }
  // Si no es mismo dominio, el href="/programa" actúa como fallback natural
})();
</script>
